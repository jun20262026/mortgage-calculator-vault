<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mortgage Calculator Icon</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
    .icon { width: 1024px; height: 1024px; background: linear-gradient(135deg, #FF9500, #FF5E3A); border-radius: 230px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .eq { font-size: 200px; color: white; font-weight: 300; line-height: 1; font-family: -apple-system, sans-serif; }
    .label { font-size: 48px; color: rgba(255,255,255,0.9); font-weight: 400; margin-top: 20px; font-family: -apple-system, sans-serif; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="icon">
    <div class="eq">=</div>
    <div class="label">房贷计算</div>
  </div>
</body>
</html>
