name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS
        run: |
          npx expo prebuild -p ios --clean
        continue-on-error: true

      - name: Create unsigned IPA (no codesign)
        run: |
          cd ios
          xcodebuild -workspace mortgage-calculator.xcworkspace \
            -scheme mortgage-calculator \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/mortgage.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive
          
          xcodebuild -exportArchive \
            -archivePath build/mortgage.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates
        continue-on-error: true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mortgage-calculator-unsigned
          path: ios/build/ipa/*.ipa
          retention-days: 30
